{{- if .Values.uninstallCleanup.enabled }}
{{- if .Values.uninstallCleanup.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chill.uninstallCleanupServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: uninstall-cleanup
    {{- include "chill.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chill.uninstallCleanupName" . }}
  labels:
    app.kubernetes.io/component: uninstall-cleanup
    {{- include "chill.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    resourceNames:
      - chillsystems.edge.dacs.io
    verbs:
      - get
  - apiGroups:
      - edge.dacs.io
    resources:
      - chillsystems
    verbs:
      - get
      - list
      - watch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chill.uninstallCleanupName" . }}
  labels:
    app.kubernetes.io/component: uninstall-cleanup
    {{- include "chill.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chill.uninstallCleanupName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "chill.uninstallCleanupServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chill.uninstallCleanupName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: uninstall-cleanup
    {{- include "chill.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.uninstallCleanup.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: uninstall-cleanup
        {{- include "chill.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "chill.uninstallCleanupServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.uninstallCleanup.podSecurityContext | nindent 8 }}
      containers:
        - name: kubectl
          image: "{{ include "chill.uninstallCleanupImage" . }}"
          imagePullPolicy: {{ .Values.uninstallCleanup.image.pullPolicy }}
          command:
            - /bin/kubectl
          args:
            - delete
            - {{ printf "chillsystems.edge.dacs.io/%s" (include "chill.systemName" .) | quote }}
            - --ignore-not-found=true
            - --wait=true
            - --timeout={{ .Values.uninstallCleanup.timeout }}
          securityContext:
            {{- toYaml .Values.uninstallCleanup.securityContext | nindent 12 }}
{{- end }}
