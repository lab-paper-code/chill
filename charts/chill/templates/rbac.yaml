apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chill.fullname" . }}-manager-role
  labels:
    {{- include "chill.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - edge.dacs.io
    resources:
      - clusterenergymodels
      - deviceclasses
      - deviceprofiles
      - modelspecs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - edge.dacs.io
    resources:
      - clusterenergymodels/finalizers
      - deviceclasses/finalizers
      - deviceprofiles/finalizers
      - modelspecs/finalizers
    verbs:
      - update
  - apiGroups:
      - edge.dacs.io
    resources:
      - clusterenergymodels/status
      - deviceclasses/status
      - deviceprofiles/status
      - modelspecs/status
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chill.fullname" . }}-manager-rolebinding
  labels:
    {{- include "chill.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chill.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "chill.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "chill.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chill.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "chill.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chill.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "chill.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "chill.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
