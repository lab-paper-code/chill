apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chill.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: controller-manager
    {{- include "chill.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "chill.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        {{- include "chill.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "chill.controllerServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ include "chill.controllerImage" . }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          command:
            - /manager
          args:
            - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.controller.healthProbeBindAddress }}
            - --system-status-name={{ include "chill.systemStatusName" . }}
            - --system-status-namespace={{ .Release.Namespace }}
            - --system-status-controller-deployment-name={{ include "chill.fullname" . }}-controller-manager
            - --system-status-node-discovery-daemonset-name={{ include "chill.fullname" . }}-node-discovery
            - --system-status-node-discovery-enabled={{ .Values.nodeDiscovery.enabled }}
            - --system-status-refresh-interval={{ .Values.systemStatus.refreshInterval }}
            {{- if .Values.controller.leaderElection }}
            - --leader-elect
            {{- end }}
            {{- if .Values.discovery.enabled }}
            - --device-discovery-enabled
            - --device-discovery-label-key={{ .Values.discovery.labelKey }}
            - --device-discovery-overwrite-manual-labels={{ .Values.discovery.overwriteManualLabels }}
            - --device-discovery-node-label-selector={{ include "chill.discoveryNodeLabelSelector" . }}
            - --device-discovery-require-catalog-match={{ .Values.discovery.requireCatalogMatch }}
            {{- if .Values.discovery.catalog.enabled }}
            - --device-discovery-catalog-name={{ include "chill.discoveryCatalogName" . }}
            - --device-discovery-catalog-namespace={{ .Release.Namespace }}
            - --device-discovery-catalog-key={{ include "chill.discoveryCatalogKey" . }}
            {{- end }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      terminationGracePeriodSeconds: 10
