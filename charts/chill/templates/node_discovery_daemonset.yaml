{{- if .Values.nodeDiscovery.enabled }}
{{- $kubeAPIServer := include "chill.nodeDiscoveryKubernetesAPIServer" . }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "chill.fullname" . }}-node-discovery
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: node-discovery
    {{- include "chill.labels" . | nindent 4 }}
spec:
  updateStrategy:
    type: {{ .Values.nodeDiscovery.updateStrategy.type }}
    {{- with .Values.nodeDiscovery.updateStrategy.rollingUpdate }}
    rollingUpdate:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: node-discovery
      {{- include "chill.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/node-discovery-signatures: {{ include (print $.Template.BasePath "/node_discovery_signatures.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/component: node-discovery
        {{- include "chill.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "chill.nodeDiscoveryServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.nodeDiscovery.podSecurityContext | nindent 8 }}
      {{- $nodeSelector := default .Values.nodeSelection.nodeSelector .Values.nodeDiscovery.nodeSelector }}
      {{- with $nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.nodeDiscovery.affinity .Values.nodeDiscovery.excludeNodeNames }}
      affinity:
        {{- with .Values.nodeDiscovery.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.nodeDiscovery.excludeNodeNames }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      {{- toYaml . | nindent 22 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeDiscovery.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-discovery
          image: "{{ include "chill.nodeDiscoveryImage" . }}"
          imagePullPolicy: {{ include "chill.nodeDiscoveryImagePullPolicy" . }}
          command:
            - /node-discovery
          args:
            - --host-root={{ .Values.nodeDiscovery.hostRoot }}
            - --interval={{ .Values.nodeDiscovery.interval }}
            - --signature-file={{ .Values.nodeDiscovery.signatureFile }}
            {{- if .Values.nodeDiscovery.cleanupOnExit }}
            - --cleanup-on-exit
            - --cleanup-timeout={{ .Values.nodeDiscovery.cleanupTimeout }}
            {{- end }}
            {{- if $kubeAPIServer }}
            - --kube-api-server={{ $kubeAPIServer }}
            {{- end }}
            - --kube-api-token-file={{ .Values.nodeDiscovery.kubernetesClient.tokenFile }}
            - --kube-api-ca-file={{ .Values.nodeDiscovery.kubernetesClient.caFile }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if $kubeAPIServer }}
            - name: CHILL_KUBE_API_SERVER
              value: {{ $kubeAPIServer | quote }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.nodeDiscovery.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.nodeDiscovery.resources | nindent 12 }}
          volumeMounts:
            - name: node-discovery-signatures
              mountPath: {{ dir .Values.nodeDiscovery.signatureFile }}
              readOnly: true
            {{- range .Values.nodeDiscovery.hostPaths }}
            - name: {{ .name }}
              mountPath: {{ $.Values.nodeDiscovery.hostRoot }}{{ .mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: node-discovery-signatures
          configMap:
            name: {{ include "chill.nodeDiscoverySignatureCatalogName" . }}
            items:
              - key: {{ include "chill.nodeDiscoverySignatureKey" . }}
                path: {{ base .Values.nodeDiscovery.signatureFile }}
        {{- range .Values.nodeDiscovery.hostPaths }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
            type: Directory
        {{- end }}
{{- end }}
