{{- if .Values.crds.enabled }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
    helm.sh/resource-policy: keep
  name: chillsystems.edge.dacs.io
spec:
  group: edge.dacs.io
  names:
    kind: ChillSystem
    listKind: ChillSystemList
    plural: chillsystems
    shortNames:
    - csys
    singular: chillsystem
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.operatorState
      name: Operator
      priority: 1
      type: string
    - jsonPath: .status.nodeDiscoveryState
      name: NodeDiscovery
      priority: 1
      type: string
    - jsonPath: .status.deviceClassCount
      name: Classes
      priority: 1
      type: integer
    - jsonPath: .status.observedNodeCount
      name: Nodes
      priority: 1
      type: integer
    - jsonPath: .status.message
      name: Message
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ChillSystem is the cluster-scoped root resource for a CHILL installation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ChillSystemSpec defines one CHILL system instance managed
              by the operator.
            properties:
              deviceDiscovery:
                description: DeviceDiscovery configures node-based DeviceClass discovery.
                properties:
                  catalog:
                    description: Catalog references the ConfigMap containing the DeviceClass
                      catalog.
                    properties:
                      key:
                        description: Key is the ConfigMap data key.
                        type: string
                      name:
                        description: Name is the ConfigMap name.
                        type: string
                      namespace:
                        description: Namespace is the ConfigMap namespace. When omitted,
                          managementNamespace is used.
                        type: string
                    type: object
                  enabled:
                    description: Enabled controls whether the operator should derive
                      DeviceClasses from Nodes.
                    type: boolean
                  fallbackPowerModes:
                    description: |-
                      FallbackPowerModes are used for inferred DeviceClasses when catalog matching is not required
                      and a Node does not match a catalog entry.
                    items:
                      description: PowerMode describes one runtime-selectable power
                        mode for a DeviceClass.
                      properties:
                        name:
                          description: Name is the human-readable platform power mode
                            name.
                          minLength: 1
                          type: string
                        nvpId:
                          description: NvpID is the nvpmodel -m identifier for Jetson
                            devices.
                          minimum: 0
                          type: integer
                      required:
                      - name
                      type: object
                    type: array
                  labelKey:
                    description: LabelKey is the Node label key used to bind Nodes
                      to DeviceClasses.
                    type: string
                  nodeLabelSelector:
                    description: NodeLabelSelector limits which Nodes participate
                      in discovery.
                    type: string
                  overwriteManualLabels:
                    description: |-
                      OverwriteManualLabels allows discovery to replace existing non-CHILL device-class labels.
                      When omitted, the operator default is used.
                    type: boolean
                  requireCatalogMatch:
                    description: |-
                      RequireCatalogMatch controls whether Nodes must match the catalog before a DeviceClass is created.
                      When omitted, the operator uses the safe default of true.
                    type: boolean
                type: object
              managementNamespace:
                description: |-
                  ManagementNamespace contains the namespaced CHILL support resources for this system.
                  When omitted, the operator namespace is used.
                type: string
              nodeDiscovery:
                description: NodeDiscovery configures the operator-managed node-discovery
                  DaemonSet.
                properties:
                  configMapKey:
                    description: ConfigMapKey is the data key containing node-discovery
                      config.
                    type: string
                  configMapName:
                    description: ConfigMapName overrides the generated node-discovery
                      config ConfigMap name.
                    type: string
                  daemonSetName:
                    description: DaemonSetName overrides the generated node-discovery
                      DaemonSet name.
                    type: string
                  enabled:
                    description: Enabled controls whether the operator should run
                      node-discovery.
                    type: boolean
                type: object
            type: object
          status:
            description: ChillSystemStatus defines the observed state of one CHILL
              system instance.
            properties:
              components:
                description: Components reports detailed per-component status.
                items:
                  description: ChillComponentStatus reports one CHILL runtime or control-plane
                    component.
                  properties:
                    available:
                      description: Available is the number of available component
                        replicas.
                      format: int32
                      minimum: 0
                      type: integer
                    desired:
                      description: Desired is the desired number of component replicas
                        or scheduled pods.
                      format: int32
                      minimum: 0
                      type: integer
                    kind:
                      description: Kind is the Kubernetes workload kind backing this
                        component.
                      type: string
                    message:
                      description: Message is a concise human-readable explanation
                        for State.
                      maxLength: 1024
                      type: string
                    name:
                      description: Name is the stable component identifier.
                      minLength: 1
                      type: string
                    namespace:
                      description: Namespace is the namespace containing this component.
                      type: string
                    ready:
                      description: Ready is the number of ready component replicas
                        or scheduled pods.
                      format: int32
                      minimum: 0
                      type: integer
                    reason:
                      description: Reason is a short machine-readable reason for State.
                      maxLength: 128
                      type: string
                    state:
                      description: State summarizes the observed component state.
                      enum:
                      - Ready
                      - Progressing
                      - Disabled
                      - Degraded
                      - Unknown
                      type: string
                  required:
                  - name
                  - state
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              conditions:
                description: Conditions follow the Kubernetes status condition convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deviceClassCount:
                description: DeviceClassCount is the number of DeviceClass objects
                  observed by CHILL.
                format: int32
                minimum: 0
                type: integer
              message:
                description: Message is a concise human-readable status summary.
                maxLength: 1024
                type: string
              nodeDiscoveryState:
                description: NodeDiscoveryState summarizes the node-discovery DaemonSet
                  state.
                enum:
                - Ready
                - Progressing
                - Disabled
                - Degraded
                - Unknown
                type: string
              observedGeneration:
                description: ObservedGeneration is the latest spec generation observed
                  by the operator.
                format: int64
                type: integer
              observedNodeCount:
                description: ObservedNodeCount is the number of Kubernetes Nodes observed
                  by CHILL.
                format: int32
                minimum: 0
                type: integer
              operatorState:
                description: OperatorState summarizes the operator Deployment state.
                enum:
                - Ready
                - Progressing
                - Disabled
                - Degraded
                - Unknown
                type: string
              phase:
                description: Phase summarizes the current CHILL installation state.
                enum:
                - Ready
                - Progressing
                - Degraded
                type: string
              ready:
                description: Ready mirrors the Ready condition for kubectl printer
                  columns.
                enum:
                - "True"
                - "False"
                - Unknown
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
