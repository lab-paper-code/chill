{{- if .Values.crds.enabled }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
    helm.sh/resource-policy: keep
  name: modelspecs.edge.dacs.io
spec:
  group: edge.dacs.io
  names:
    kind: ModelSpec
    listKind: ModelSpecList
    plural: modelspecs
    singular: modelspec
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ModelSpec is the Schema for the modelspecs API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ModelSpecSpec defines the stable model artifacts and their execution-path
              requirements.
            properties:
              artifacts:
                description: Artifacts contains immutable executable representations
                  of this logical model.
                items:
                  description: ModelArtifact identifies one immutable executable representation.
                  properties:
                    digest:
                      description: Digest identifies the exact artifact bytes. The
                        first schema accepts SHA-256.
                      pattern: ^sha256:[0-9a-f]{64}$
                      type: string
                    format:
                      description: Format names the artifact representation, such
                        as onnx.
                      minLength: 1
                      type: string
                    name:
                      description: Name is unique within one ModelSpec and is referenced
                        by execution paths.
                      minLength: 1
                      type: string
                  required:
                  - digest
                  - format
                  - name
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              executionPaths:
                description: ExecutionPaths binds artifacts to required runtime families
                  and backends.
                items:
                  description: ModelExecutionPath describes one stable artifact/runtime
                    requirement.
                  properties:
                    artifact:
                      description: |-
                        Artifact references a ModelArtifact name in this ModelSpec.
                        Reference resolution is semantic validation, not OpenAPI structure.
                      minLength: 1
                      type: string
                    name:
                      description: Name is unique within one ModelSpec.
                      minLength: 1
                      type: string
                    runtime:
                      description: Runtime contains the software path required to
                        consume the artifact.
                      properties:
                        backend:
                          description: Backend names the required backend within the
                            runtime-family context.
                          minLength: 1
                          type: string
                        family:
                          description: Family names the required runtime family, such
                            as onnxruntime.
                          minLength: 1
                          type: string
                      required:
                      - backend
                      - family
                      type: object
                  required:
                  - artifact
                  - name
                  - runtime
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - artifacts
            - executionPaths
            type: object
          status:
            description: ModelSpecStatus defines the observed state of ModelSpec
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
