{{- if and .Values.discovery.catalog.enabled .Values.discovery.catalog.createDeviceClasses }}
{{- range .Values.discovery.catalog.classes }}
---
apiVersion: edge.dacs.io/v1alpha1
kind: DeviceClass
metadata:
  name: {{ required "discovery.catalog.classes[].name must not be empty" .name }}
  labels:
    app.kubernetes.io/component: device-class
    {{- include "chill.labels" $ | nindent 4 }}
spec:
  nodeSelector:
    {{ $.Values.discovery.labelKey }}: {{ .name | quote }}
  architecture: {{ required (printf "discovery.catalog.classes[%s].architecture must not be empty" .name) .architecture | quote }}
  memory: {{ required (printf "discovery.catalog.classes[%s].memory must not be empty" .name) .memory | quote }}
  accelerator: {{ default "none" .accelerator | quote }}
  powerModes:
    {{- required (printf "discovery.catalog.classes[%s].powerModes must not be empty" .name) .powerModes | toYaml | nindent 4 }}
{{- end }}
{{- end }}
