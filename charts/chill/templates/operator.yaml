apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chill.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: operator
    {{- include "chill.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: operator
      {{- include "chill.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: operator
      labels:
        app.kubernetes.io/component: operator
        {{- include "chill.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "chill.operatorServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.operator.podSecurityContext | nindent 8 }}
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.operator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ include "chill.operatorImage" . }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          command:
            - /operator
          args:
            - --metrics-bind-address={{ .Values.operator.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.operator.healthProbeBindAddress }}
            - --system-status-name={{ include "chill.systemStatusName" . }}
            - --system-status-namespace={{ .Release.Namespace }}
            - --system-status-operator-deployment-name={{ include "chill.fullname" . }}-operator
            - --system-status-node-discovery-daemonset-name={{ include "chill.fullname" . }}-node-discovery
            - --system-status-node-discovery-enabled={{ .Values.nodeDiscovery.enabled }}
            - --system-status-refresh-interval={{ .Values.systemStatus.refreshInterval }}
            - --node-discovery-config-name={{ include "chill.nodeDiscoveryConfigName" . }}
            - --node-discovery-config-namespace={{ .Release.Namespace }}
            - --node-discovery-config-key=config.yaml
            - --node-discovery-reconcile-interval={{ .Values.nodeDiscovery.reconcileInterval }}
            {{- if .Values.operator.leaderElection }}
            - --leader-elect
            {{- end }}
            {{- if .Values.discovery.enabled }}
            - --device-discovery-enabled
            - --device-discovery-label-key={{ .Values.discovery.labelKey }}
            - --device-discovery-overwrite-manual-labels={{ .Values.discovery.overwriteManualLabels }}
            - --device-discovery-node-label-selector={{ include "chill.discoveryNodeLabelSelector" . }}
            - --device-discovery-require-catalog-match={{ .Values.discovery.requireCatalogMatch }}
            {{- if .Values.discovery.catalog.enabled }}
            - --device-discovery-catalog-name={{ include "chill.discoveryCatalogName" . }}
            - --device-discovery-catalog-namespace={{ .Release.Namespace }}
            - --device-discovery-catalog-key={{ include "chill.discoveryCatalogKey" . }}
            {{- end }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            {{- toYaml .Values.operator.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      terminationGracePeriodSeconds: 10
