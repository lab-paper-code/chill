nameOverride: ""
fullnameOverride: ""

crds:
  enabled: true

systemStatus:
  name: ""
  refreshInterval: 30s

nodeSelection:
  labelSelector: node-role.kubernetes.io/edge
  nodeSelector:
    node-role.kubernetes.io/edge: ""

discovery:
  enabled: true
  labelKey: edge.dacs.io/device-class
  overwriteManualLabels: false
  nodeLabelSelector: ""
  requireCatalogMatch: true
  catalog:
    enabled: true
    createDeviceClasses: true
    name: ""
    key: catalog.yaml
    classes:
      - name: jetson-agx-orin-64g
        matchLabels:
          edge.dacs.io/device-vendor: nvidia
          edge.dacs.io/device-family: jetson
          edge.dacs.io/device-model: agx-orin
        architecture: arm64
        memory: 64Gi
        accelerator: nvidia-jetson-agx-orin
        powerModes:
          - name: MAXN
            nvpId: 0
          - name: MODE_15W
            nvpId: 1
          - name: MODE_30W
            nvpId: 2
          - name: MODE_50W
            nvpId: 3
      - name: jetson-orin-nano-8g
        matchLabels:
          edge.dacs.io/device-vendor: nvidia
          edge.dacs.io/device-family: jetson
          edge.dacs.io/device-model: orin-nano
        architecture: arm64
        memory: 8Gi
        accelerator: nvidia-jetson-orin-nano
        powerModes:
          - name: 15W
            nvpId: 0
          - name: 25W
            nvpId: 1
          - name: MAXN_SUPER
            nvpId: 2
          - name: 7W
            nvpId: 3
      - name: jetson-xavier-nx-8g
        matchLabels:
          edge.dacs.io/device-vendor: nvidia
          edge.dacs.io/device-family: jetson
          edge.dacs.io/device-model: xavier-nx
        architecture: arm64
        memory: 8Gi
        accelerator: nvidia-jetson-xavier-nx
        powerModes:
          - name: MODE_15W_2CORE
            nvpId: 0
          - name: MODE_15W_4CORE
            nvpId: 1
          - name: MODE_15W_6CORE
            nvpId: 2
          - name: MODE_10W_2CORE
            nvpId: 3
          - name: MODE_10W_4CORE
            nvpId: 4
          - name: MODE_10W_DESKTOP
            nvpId: 5
          - name: MODE_20W_2CORE
            nvpId: 6
          - name: MODE_20W_4CORE
            nvpId: 7
          - name: MODE_20W_6CORE
            nvpId: 8
      - name: jetson-nano-4g
        matchLabels:
          edge.dacs.io/device-vendor: nvidia
          edge.dacs.io/device-family: jetson
          edge.dacs.io/device-model: jetson-nano
        architecture: arm64
        memory: 4Gi
        accelerator: nvidia-jetson-nano
        powerModes:
          - name: 10W
            nvpId: 0
          - name: 5W
            nvpId: 1
      - name: orangepi-5-plus-16g
        matchLabels:
          edge.dacs.io/device-vendor: xunlong
          edge.dacs.io/device-family: orangepi
          edge.dacs.io/device-model: orange-pi-5-plus
        architecture: arm64
        memory: 16Gi
        accelerator: rk3588-npu
        powerModes:
          - name: fixed
      - name: raspberry-pi-5-8g
        matchLabels:
          edge.dacs.io/device-vendor: raspberrypi
          edge.dacs.io/device-family: raspberry-pi
          edge.dacs.io/device-model: raspberry-pi-5
        architecture: arm64
        memory: 8Gi
        accelerator: none
        powerModes:
          - name: fixed
      - name: lattepanda-3-delta-8g
        matchLabels:
          edge.dacs.io/device-vendor: lattepanda
          edge.dacs.io/device-family: lattepanda
          edge.dacs.io/device-model: lattepanda-3-delta
        architecture: amd64
        memory: 8Gi
        accelerator: none
        powerModes:
          - name: fixed

nodeDiscovery:
  enabled: true
  interval: 10m
  hostRoot: /host
  signatureFile: /etc/chill/node-discovery/signatures.yaml
  cleanupOnExit: true
  cleanupTimeout: 10s
  kubernetesClient:
    apiServer: ""
    discoverFromDefaultEndpoint: true
    tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  sources:
    - paths:
        - proc/device-tree/model
        - sys/firmware/devicetree/base/model
    - paths:
        - proc/device-tree/compatible
        - sys/firmware/devicetree/base/compatible
    - paths:
        - etc/nv_tegra_release
    - paths:
        - sys/devices/virtual/dmi/id/sys_vendor
        - sys/class/dmi/id/sys_vendor
    - paths:
        - sys/devices/virtual/dmi/id/product_name
        - sys/class/dmi/id/product_name
  signatures:
    - contains: ["nvidia jetson", "orin nano"]
      facts:
        vendor: nvidia
        family: jetson
        model: orin-nano
        accelerator: nvidia-jetson-orin-nano
    - contains: ["agx orin"]
      facts:
        vendor: nvidia
        family: jetson
        model: agx-orin
        accelerator: nvidia-jetson-agx-orin
    - contains: ["nvidia jetson", "agx orin"]
      facts:
        vendor: nvidia
        family: jetson
        model: agx-orin
        accelerator: nvidia-jetson-agx-orin
    - contains: ["xavier nx"]
      facts:
        vendor: nvidia
        family: jetson
        model: xavier-nx
        accelerator: nvidia-jetson-xavier-nx
    - contains: ["nvidia jetson", "xavier nx"]
      facts:
        vendor: nvidia
        family: jetson
        model: xavier-nx
        accelerator: nvidia-jetson-xavier-nx
    - contains: ["jetson nano"]
      facts:
        vendor: nvidia
        family: jetson
        model: jetson-nano
        accelerator: nvidia-jetson-nano
    - contains: ["nvidia jetson", "orin"]
      facts:
        vendor: nvidia
        family: jetson
        model: orin
        accelerator: nvidia-jetson-orin
    - contains: ["nvidia jetson", "xavier"]
      facts:
        vendor: nvidia
        family: jetson
        model: xavier
        accelerator: nvidia-jetson-xavier
    - contains: ["nv_tegra"]
      facts:
        vendor: nvidia
        family: jetson
        model: jetson
        accelerator: nvidia-jetson
    - contains: ["raspberry pi 5"]
      facts:
        vendor: raspberrypi
        family: raspberry-pi
        model: raspberry-pi-5
        accelerator: none
    - contains: ["orange pi 5 plus"]
      facts:
        vendor: xunlong
        family: orangepi
        model: orange-pi-5-plus
        accelerator: rk3588-npu
    - contains: ["lattepanda 3 delta"]
      facts:
        vendor: lattepanda
        family: lattepanda
        model: lattepanda-3-delta
        accelerator: none
  image:
    repository: daclab/chill-node-discovery
    tag: ""
    pullPolicy: IfNotPresent
  nodeSelector: {}
  excludeNodeNames: []
  affinity: {}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "100%"
  hostPaths:
    - name: host-proc
      hostPath: /proc
      mountPath: /proc
    - name: host-sys
      hostPath: /sys
      mountPath: /sys
    - name: host-etc
      hostPath: /etc
      mountPath: /etc
  tolerations:
    - key: node-role.kubernetes.io/edge
      operator: Exists
      effect: NoSchedule
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 5m
      memory: 32Mi
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  serviceAccount:
    create: true
    name: ""

controller:
  replicaCount: 1
  image:
    repository: daclab/chill-controller
    tag: ""
    pullPolicy: IfNotPresent
  metricsBindAddress: "0"
  healthProbeBindAddress: ":8081"
  leaderElection: true
  nodeSelector: {}
  affinity: {}
  tolerations: []
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

serviceAccount:
  create: true
  name: ""
