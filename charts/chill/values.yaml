nameOverride: ""
fullnameOverride: ""

crds:
  enabled: true

systemStatus:
  name: ""
  refreshInterval: 30s

nodeSelection:
  labelSelector: node-role.kubernetes.io/edge
  nodeSelector:
    node-role.kubernetes.io/edge: ""

discovery:
  enabled: false
  labelKey: edge.dacs.io/device-class
  overwriteManualLabels: false
  nodeLabelSelector: ""
  requireCatalogMatch: true
  catalog:
    enabled: true
    name: ""
    key: catalog.yaml
    classes: []

nodeDiscovery:
  enabled: false
  interval: 10m
  hostRoot: /host
  signatureFile: /etc/chill/node-discovery/signatures.yaml
  sources: []
  signatures: []
  image:
    repository: chill/node-discovery
    tag: latest
    pullPolicy: IfNotPresent
  nodeSelector: {}
  affinity: {}
  hostPaths:
    - name: host-proc
      hostPath: /proc
      mountPath: /proc
    - name: host-sys
      hostPath: /sys
      mountPath: /sys
    - name: host-etc
      hostPath: /etc
      mountPath: /etc
  tolerations: []
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 5m
      memory: 32Mi
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  serviceAccount:
    create: true
    name: ""

controller:
  replicaCount: 1
  image:
    repository: chill/controller
    tag: latest
    pullPolicy: IfNotPresent
  metricsBindAddress: "0"
  healthProbeBindAddress: ":8081"
  leaderElection: true
  nodeSelector: {}
  affinity: {}
  tolerations: []
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

serviceAccount:
  create: true
  name: ""
