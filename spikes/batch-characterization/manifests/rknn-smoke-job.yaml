apiVersion: batch/v1
# TODO(internal): Replace this Orange-Pi-specific smoke Job with a controller
# template driven by DeviceClass, ModelArtifact capability, and a derived RKNN
# execution contract.
kind: Job
metadata:
  name: mobilenet-v2-100-rknn-smoke
  namespace: chill-batch-characterization
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chill-rknn-characterization
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        # TODO(internal): Resolve an eligible member Node; this is not a stable
        # user selection interface.
        edge.dacs.io/device-class: orangepi-5-plus-16g
      tolerations:
        - key: node-role.kubernetes.io/edge
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: artifact
          image: 155.230.35.213:5000/chill/spike-mobilenet-v2-100-rknn-artifact:v1
          command: ["sh", "-ec", "cp /artifact/bs1.rknn /model/model.rknn"]
          volumeMounts:
            - {name: model, mountPath: /model}
      containers:
        - name: runtime
          image: 155.230.35.213:5000/chill/spike-batch-characterization:rknn-contract-v3
          env:
            - {name: BATCH_SIZE, value: "1"}
            - {name: MODEL_PATH, value: /model/model.rknn}
            - {name: ARTIFACT_DIGEST, value: "sha256:43e68150fef2a9001f140f526cc7c178843502ab12028672e0d245a5df5df599"}
            - {name: ARTIFACT_SHAPE_MODE, value: static}
            - {name: SUPPORTED_BATCHES, value: "1"}
            - {name: EXECUTION_POLICY, value: OnePodPerNodeSingleNPUCore}
            - {name: EXECUTION_CONTRACT_SOURCE, value: SpikeManifestPinnedFromLiveNodeAndArtifactFacts}
            - {name: DEVICE_CLASS, value: orangepi-5-plus-16g}
            - {name: ACCELERATOR, value: rk3588-npu}
            - {name: ACCELERATOR_DEVICE_INTERFACE, value: /dev/dri/renderD129}
            - {name: WARMUP_ITERATIONS, value: "5"}
            - {name: MEASUREMENT_DURATION_SECONDS, value: "10"}
            - {name: OBSERVER_READY_FILE, value: /coordination/observer-ready}
            - {name: MEASUREMENT_SIGNAL_FILE, value: /coordination/measurement-start}
            - name: NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
          securityContext:
            # TODO(internal): Remove privileged mode. Expose the RK3588 NPU via
            # a device plugin/extended resource and a documented runtime class.
            privileged: true
          volumeMounts:
            - {name: model, mountPath: /model, readOnly: true}
            - {name: coordination, mountPath: /coordination}
            - {name: dri, mountPath: /dev/dri}
            - {name: rknn-runtime-library, mountPath: /usr/lib/librknnrt.so, readOnly: true}
        - name: power-observer
          image: 155.230.35.213:5000/chill/spike-power-observer:arm64-v1
          args: ["-node-name=orangepi", "-resolved-endpoint=http://155.230.34.143:9102/metrics", "-interval=1s", "-duration=10s", "-request-timeout=500ms", "-ready-file=/coordination/observer-ready", "-start-signal-file=/coordination/measurement-start"]
          volumeMounts:
            - {name: coordination, mountPath: /coordination}
      volumes:
        - {name: model, emptyDir: {}}
        - {name: coordination, emptyDir: {}}
        - name: dri
          # TODO(internal): Device-plugin allocation replaces hostPath access.
          hostPath: {path: /dev/dri, type: Directory}
        - name: rknn-runtime-library
          # TODO(internal): The node runtime installation or runtime image must
          # provide an ABI-validated librknnrt; do not mount a host library ad hoc.
          hostPath: {path: /usr/lib/librknnrt.so, type: File}
